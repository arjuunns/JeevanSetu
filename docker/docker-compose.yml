# Local infrastructure + app stack for JeevanSetu.
# Brings up PostgreSQL, Redis, Neo4j and the containerised server & web apps.
# Build context is the repo root (..) so the Dockerfiles can reach the pnpm
# workspace; the Dockerfiles themselves live in docker/Dockerfile.*.
#
#   docker compose -f docker/docker-compose.yml up -d --build
#
# App env is loaded from ../.env (copy ../.env.example first); the connection
# URLs below override the localhost defaults to point at the compose services.

services:
  postgres:
    image: postgres:16-alpine
    container_name: jeevansetu-postgres
    environment:
      POSTGRES_USER: jeevansetu
      POSTGRES_PASSWORD: jeevansetu
      POSTGRES_DB: jeevansetu
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jeevansetu']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jeevansetu-redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: jeevansetu-neo4j
    environment:
      NEO4J_AUTH: neo4j/jeevansetu
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - '7474:7474' # browser
      - '7687:7687' # bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:7474 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: jeevansetu-server
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: '4000'
      WEB_ORIGIN: http://localhost:3000
      # Point at the compose services rather than localhost.
      # REDIS_URL is intentionally NOT overridden here — the server uses the
      # Upstash rediss:// endpoint from ../.env.
      DATABASE_URL: postgresql://jeevansetu:jeevansetu@postgres:5432/jeevansetu?schema=public
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: jeevansetu
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        # NEXT_PUBLIC_* are inlined into the client bundle at build time.
        # The browser hits Next's /api/server/* rewrite, which proxies to the
        # server service inside the compose network.
        NEXT_PUBLIC_API_URL: http://server:4000
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    container_name: jeevansetu-web
    environment:
      NODE_ENV: production
      # Used by Next's rewrite at runtime (server-side proxy target).
      NEXT_PUBLIC_API_URL: http://server:4000
    ports:
      - '3000:3000'
    depends_on:
      - server

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
