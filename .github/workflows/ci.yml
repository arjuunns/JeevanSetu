name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jeevansetu
          POSTGRES_PASSWORD: jeevansetu
          POSTGRES_DB: jeevansetu_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U jeevansetu"
          --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      DATABASE_URL: postgresql://jeevansetu:jeevansetu@localhost:5432/jeevansetu_test?schema=public
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @jeevansetu/server db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit & integration tests
        run: pnpm test

      - name: Build
        run: pnpm build
